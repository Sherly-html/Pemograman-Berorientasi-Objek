{% extends "base.html" %}
{% block title %}Daftar — SmartShop{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card auth-card-wide">
    <div class="auth-header">
      <div class="auth-logo">👤</div>
      <h1 class="auth-title">Buat Akun Baru</h1>
      <p class="auth-sub">Daftar dan mulai belanja di SmartShop</p>
    </div>
    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" name="full_name" class="form-input"
            placeholder="Nama lengkap kamu"
            value="{{ request.form.get('full_name','') }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Nomor Telepon</label>
          <input type="tel" name="phone" class="form-input"
            placeholder="Contoh: 081234567890"
            value="{{ request.form.get('phone','') }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Alamat Lengkap</label>
        <textarea name="address" class="form-input form-textarea" rows="3"
          placeholder="Jalan, RT/RW, Kelurahan, Kecamatan, Kota..." required>{{ request.form.get('address','') }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input"
            placeholder="Min 3 karakter, tanpa spasi"
            value="{{ request.form.get('username','') }}"
            autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <input type="password" id="pw" name="password" class="form-input"
              placeholder="Minimal 6 karakter" autocomplete="new-password" required>
            <button type="button" class="eye-btn" onclick="togglePass('pw',this)" tabindex="-1">👁</button>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Buat Akun</button>
    </form>
    <p class="auth-footer-text">
      Sudah punya akun? <a href="{{ url_for('login') }}" class="link">Masuk di sini</a>
    </p>
  </div>
</div>
{% endblock %}
