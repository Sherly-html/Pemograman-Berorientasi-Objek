{% extends "base.html" %}
{% block title %}Login — SmartShop{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🛍️</div>
      <h1 class="auth-title">Selamat Datang</h1>
      <p class="auth-sub">Masuk ke akun SmartShop kamu</p>
    </div>
    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input"
          placeholder="Masukkan username"
          value="{{ request.form.get('username','') }}"
          autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" id="pw" name="password" class="form-input"
            placeholder="Masukkan password" autocomplete="current-password" required>
          <button type="button" class="eye-btn" onclick="togglePass('pw',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Masuk</button>
    </form>
    <p class="auth-footer-text">
      Belum punya akun? <a href="{{ url_for('register') }}" class="link">Daftar sekarang</a>
    </p>
    <div class="info-box">
      🔑 <strong>Demo Admin:</strong> username <code>admin</code> &nbsp;|&nbsp; password <code>admin123</code>
    </div>
  </div>
</div>
{% endblock %}
