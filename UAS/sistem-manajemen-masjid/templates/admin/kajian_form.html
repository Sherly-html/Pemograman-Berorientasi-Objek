{% extends "admin/base_admin.html" %}
{% block title %}{{ judul_halaman }}{% endblock %}
{% block page_title %}{{ judul_halaman }}{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-xl-9">

    <nav class="mb-3">
      <ol class="breadcrumb breadcrumb-custom">
        <li class="breadcrumb-item">
          <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
        </li>
        <li class="breadcrumb-item">
          <a href="{{ url_for('admin.kelola_kajian') }}">Kajian</a>
        </li>
        <li class="breadcrumb-item active">{{ judul_halaman }}</li>
      </ol>
    </nav>

    <div class="admin-card">
      <div class="admin-card-header">
        <h6 class="admin-card-title mb-0">
          <i class="bi bi-pencil-square me-2"></i>{{ judul_halaman }}
        </h6>
      </div>
      <div class="admin-card-body">

        <form method="POST" novalidate>

          <!-- Judul -->
          <div class="form-group-modern mb-3">
            <label class="form-label-modern">
              Judul Kajian <span class="text-danger">*</span>
            </label>
            <input type="text" name="judul" class="form-control form-control-modern"
                   placeholder="Contoh: Kajian Tafsir Al-Quran"
                   value="{{ kajian.judul if kajian else '' }}"
                   required minlength="5"/>
          </div>

          <!-- Pemateri & Lokasi -->
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <div class="form-group-modern">
                <label class="form-label-modern">
                  Pemateri <span class="text-danger">*</span>
                </label>
                <input type="text" name="pemateri" class="form-control form-control-modern"
                       placeholder="Nama ustadz/pemateri"
                       value="{{ kajian.pemateri if kajian else '' }}" required/>
              </div>
            </div>
            <div class="col-12 col-sm-6">
              <div class="form-group-modern">
                <label class="form-label-modern">
                  Lokasi <span class="text-danger">*</span>
                </label>
                <input type="text" name="lokasi" class="form-control form-control-modern"
                       placeholder="Contoh: Aula Masjid Lt.2"
                       value="{{ kajian.lokasi if kajian else '' }}" required/>
              </div>
            </div>
          </div>

          <!-- Hari, Waktu, Kuota -->
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-4">
              <div class="form-group-modern">
                <label class="form-label-modern">
                  Hari <span class="text-danger">*</span>
                </label>
                <select name="hari" class="form-select form-control-modern">
                  {% for hari in hari_list %}
                  <option value="{{ hari }}"
                    {{ 'selected' if kajian and kajian.hari == hari }}>
                    {{ hari }}
                  </option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-12 col-sm-4">
              <div class="form-group-modern">
                <label class="form-label-modern">
                  Waktu <span class="text-danger">*</span>
                </label>
                <input type="time" name="waktu" class="form-control form-control-modern"
                       value="{{ kajian.waktu if kajian else '08:00' }}" required/>
              </div>
            </div>
            <div class="col-12 col-sm-4">
              <div class="form-group-modern">
                <label class="form-label-modern">Kuota Peserta</label>
                <input type="number" name="kuota" class="form-control form-control-modern"
                       min="1" placeholder="100"
                       value="{{ kajian.kuota if kajian else 100 }}"/>
              </div>
            </div>
          </div>

          <!-- Deskripsi -->
          <div class="form-group-modern mb-4">
            <label class="form-label-modern">Deskripsi (opsional)</label>
            <textarea name="deskripsi" class="form-control form-control-modern"
                      rows="4" placeholder="Deskripsi singkat kajian..."
            >{{ kajian.deskripsi if kajian else '' }}</textarea>
          </div>

          <!-- Tombol -->
          <div class="d-flex flex-wrap gap-2">
            <button type="submit" class="btn btn-navy">
              <i class="bi bi-save me-2"></i>
              {{ 'Update Kajian' if kajian else 'Simpan Kajian' }}
            </button>
            <a href="{{ url_for('admin.kelola_kajian') }}"
               class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i>Batal
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
