{% extends "admin/base_admin.html" %}
{% block title %}{{ judul_halaman }}{% endblock %}
{% block page_title %}{{ judul_halaman }}{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-xl-9">

    <nav class="mb-3">
      <ol class="breadcrumb breadcrumb-custom">
        <li class="breadcrumb-item">
          <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
        </li>
        <li class="breadcrumb-item">
          <a href="{{ url_for('admin.kelola_pengumuman') }}">Pengumuman</a>
        </li>
        <li class="breadcrumb-item active">{{ judul_halaman }}</li>
      </ol>
    </nav>

    <div class="admin-card">
      <div class="admin-card-header">
        <h6 class="admin-card-title mb-0">
          <i class="bi bi-pencil-square me-2"></i>{{ judul_halaman }}
        </h6>
      </div>
      <div class="admin-card-body">

        <form method="POST" novalidate>

          <!-- Judul -->
          <div class="form-group-modern mb-3">
            <label class="form-label-modern">
              Judul Pengumuman <span class="text-danger">*</span>
            </label>
            <input type="text" name="judul" class="form-control form-control-modern"
                   placeholder="Contoh: Jadwal Kerja Bakti Masjid"
                   value="{{ pengumuman.judul if pengumuman else '' }}"
                   required minlength="5"/>
          </div>

          <!-- Tipe, Prioritas, Tanggal -->
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-4">
              <div class="form-group-modern">
                <label class="form-label-modern">Tipe</label>
                <select name="tipe" class="form-select form-control-modern">
                  {% for t in tipe_list %}
                  <option value="{{ t }}"
                    {{ 'selected' if pengumuman and pengumuman.tipe == t }}>
                    {{ t }}
                  </option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-12 col-sm-4">
              <div class="form-group-modern">
                <label class="form-label-modern">Prioritas</label>
                <select name="prioritas" class="form-select form-control-modern">
                  {% for pr in prioritas_list %}
                  <option value="{{ pr }}"
                    {{ 'selected' if pengumuman and pengumuman.prioritas == pr }}>
                    {{ pr|capitalize }}
                  </option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-12 col-sm-4">
              <div class="form-group-modern">
                <label class="form-label-modern">Tanggal Berlaku</label>
                <input type="date" name="tanggal_berlaku"
                       class="form-control form-control-modern"
                       value="{{ pengumuman.tanggal_berlaku if pengumuman else '' }}"/>
              </div>
            </div>
          </div>

          <!-- Isi -->
          <div class="form-group-modern mb-3">
            <label class="form-label-modern">
              Isi Pengumuman <span class="text-danger">*</span>
            </label>
            <textarea name="isi" class="form-control form-control-modern"
                      rows="6" placeholder="Tulis isi pengumuman di sini..."
                      required minlength="10"
            >{{ pengumuman.isi if pengumuman else '' }}</textarea>
          </div>

          <!-- Status Aktif -->
          <div class="form-group-modern mb-4">
            <label class="form-label-modern">Status</label>
            <div class="d-flex gap-3 flex-wrap">
              <div class="form-check form-check-modern">
                <input class="form-check-input" type="radio" name="aktif"
                       id="aktifTrue" value="true"
                       {{ 'checked' if not pengumuman or pengumuman.aktif }}>
                <label class="form-check-label" for="aktifTrue">
                  <i class="bi bi-check-circle me-1 text-success"></i>Aktif
                </label>
              </div>
              <div class="form-check form-check-modern">
                <input class="form-check-input" type="radio" name="aktif"
                       id="aktifFalse" value="false"
                       {{ 'checked' if pengumuman and not pengumuman.aktif }}>
                <label class="form-check-label" for="aktifFalse">
                  <i class="bi bi-pause-circle me-1 text-warning"></i>Nonaktif
                </label>
              </div>
            </div>
          </div>

          <!-- Tombol -->
          <div class="d-flex flex-wrap gap-2">
            <button type="submit" class="btn btn-navy">
              <i class="bi bi-save me-2"></i>
              {{ 'Update Pengumuman' if pengumuman else 'Simpan Pengumuman' }}
            </button>
            <a href="{{ url_for('admin.kelola_pengumuman') }}"
               class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i>Batal
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
