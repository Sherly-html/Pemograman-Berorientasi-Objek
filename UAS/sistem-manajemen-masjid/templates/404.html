{% extends "base.html" %}
{% block title %}404 — Halaman Tidak Ditemukan{% endblock %}

{% block content %}
<section class="section-pad">
  <div class="container">
    <div class="row justify-content-center text-center">
      <div class="col-12 col-md-6">
        <div class="error-page">
          <div class="error-code">404</div>
          <div class="error-icon">
            <i class="bi bi-compass"></i>
          </div>
          <h2 class="error-title">Halaman Tidak Ditemukan</h2>
          <p class="error-subtitle">
            Maaf, halaman yang Anda cari tidak ada atau
            telah dipindahkan.
          </p>
          <div class="d-flex flex-wrap justify-content-center gap-3">
            <a href="{{ url_for('public.home') }}" class="btn btn-navy">
              <i class="bi bi-house me-2"></i>Kembali ke Beranda
            </a>
            <a href="{{ url_for('public.artikel') }}" class="btn btn-outline-navy">
              <i class="bi bi-newspaper me-2"></i>Baca Artikel
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
